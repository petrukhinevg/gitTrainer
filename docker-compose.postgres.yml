services:
  postgres:
    image: postgres:16
    container_name: git-trainer-postgres
    environment:
      POSTGRES_DB: git_trainer
      POSTGRES_USER: git_trainer
      POSTGRES_PASSWORD: git_trainer
    ports:
      - "5432:5432"
    volumes:
      - git_trainer_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U git_trainer -d git_trainer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  git_trainer_pg_data:
