plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.3'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'
description = 'gitTrainer'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

def frontendDir = layout.projectDirectory.dir("frontend")
def frontendDistDir = frontendDir.dir("dist")
def isWindows = System.getProperty("os.name").toLowerCase().contains("win")
def npmCommand = isWindows ? "npm.cmd" : "npm"

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.register('frontendInstall', Exec) {
    workingDir frontendDir.asFile
    inputs.files(
            frontendDir.file("package.json"),
            frontendDir.file("package-lock.json")
    )
    outputs.dir(frontendDir.dir("node_modules"))
    commandLine npmCommand, "ci"
}

tasks.register('frontendBuild', Exec) {
    dependsOn tasks.named('frontendInstall')
    workingDir frontendDir.asFile
    inputs.files(fileTree(frontendDir) {
        exclude "dist/**", "node_modules/**"
    })
    outputs.dir(frontendDistDir)
    commandLine npmCommand, "run", "build"
}

tasks.named('processResources') {
    dependsOn tasks.named('frontendBuild')
    from(frontendDistDir) {
        into "static"
    }
}
